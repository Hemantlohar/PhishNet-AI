<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback - PhishNet AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-container {
            margin: 40px auto;
            max-width: 600px;
        }
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-submit:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">🎣 PhishNet AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/analyze">Analyze Email</a></li>
                    <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/feedback">Submit Feedback</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="mb-4">📣 Submit Feedback</h2>
                <p class="text-muted">Report false positives, suggest model improvements, or ask questions to the system administrators.</p>

                <form th:action="@{/feedback}" method="post">
                    <div class="mb-3">
                        <label for="subject" class="form-label font-weight-bold">Subject</label>
                        <input type="text" class="form-control" id="subject" name="subject" 
                               placeholder="e.g. Model False Positive on Newsletter" required>
                    </div>

                    <div class="mb-3">
                        <label for="message" class="form-label font-weight-bold">Message</label>
                        <textarea class="form-control" id="message" name="message" 
                                  rows="6" placeholder="Describe your inquiry or warning parameters..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-submit">📤 Send Feedback</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
