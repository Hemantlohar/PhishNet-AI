<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - PhishNet AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-container {
            margin: 40px auto;
            max-width: 600px;
        }
        .btn-update {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-update:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">🎣 PhishNet AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/analyze">Analyze Email</a></li>
                    <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
                    <li class="nav-item"><a class="nav-link" href="/feedback">Submit Feedback</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/profile">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="mb-4">👤 Profile Settings</h2>

                <!-- Status Alerts -->
                <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">Error</div>
                <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}">Success</div>

                <form th:action="@{/profile}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label font-weight-bold">Username (Read-Only)</label>
                        <input type="text" class="form-control bg-light" id="username" th:value="${user.username}" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label font-weight-bold">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" th:value="${user.email}" required>
                    </div>

                    <hr class="my-4">
                    <h5 class="mb-3 text-muted">Change Password (Optional)</h5>

                    <div class="mb-3">
                        <label for="password" class="form-label font-weight-bold">New Password</label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Leave blank to keep current password">
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label font-weight-bold">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                               placeholder="Leave blank to keep current password">
                    </div>

                    <button type="submit" class="btn btn-update">💾 Save Profile Changes</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
